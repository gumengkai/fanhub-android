name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Debug - List files
      run: |
        echo "=== Project Root ==="
        ls -la
        echo ""
        echo "=== Gradle Wrapper ==="
        ls -la gradlew
        ls -la gradle/wrapper/
        echo ""
        echo "=== App Directory ==="
        ls -la app/
        echo ""
        echo "=== Src Directory ==="
        ls -la app/src/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Check Gradle wrapper
      run: |
        echo "Gradle wrapper jar size:"
        ls -lh gradle/wrapper/gradle-wrapper.jar
        echo ""
        echo "Gradle wrapper properties:"
        cat gradle/wrapper/gradle-wrapper.properties

    - name: Build Debug APK
      run: |
        echo "Starting build..."
        ./gradlew assembleDebug --no-daemon --stacktrace
        echo "Build finished"
        echo ""
        echo "=== Looking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo ""
        echo "=== Build outputs directory ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
        echo ""
        echo "=== APK directory ==="
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
        echo ""
        echo "=== Debug directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug directory"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload build outputs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-outputs
        path: app/build/outputs/
        if-no-files-found: warn