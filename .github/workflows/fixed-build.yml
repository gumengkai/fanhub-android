name: Fixed Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --version
          ./gradlew clean assembleDebug --no-daemon --stacktrace
      
      - name: Find APK
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          
          echo ""
          echo "=== Checking build structure ==="
          ls -laR app/build/outputs/ 2>/dev/null || true
          
          # Copy APK to known location
          mkdir -p ./output
          find app/build -name "*.apk" -type f -exec cp {} ./output/ \;
          ls -la ./output/
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fanhub-debug-apk
          path: ./output/*.apk
          retention-days: 30
          if-no-files-found: warn
