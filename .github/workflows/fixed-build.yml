name: Fixed Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - run: chmod +x gradlew
      
      - run: ./gradlew --version
      
      - run: ./gradlew clean
      
      - run: ./gradlew assembleDebug --stacktrace
      
      - run: |
          echo "=== Checking build outputs ==="
          ls -la app/build/ 2>/dev/null || echo "No build directory"
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs directory"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk directory"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug directory"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn