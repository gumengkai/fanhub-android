name: Fixed Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --version
          ./gradlew clean assembleDebug --no-daemon --stacktrace
      
      - name: Find APK
        id: find_apk
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          
          echo ""
          echo "=== Checking build structure ==="
          ls -laR app/build/outputs/apk/ 2>/dev/null || true
          
          # Find the APK and save path
          APK_PATH=$(find app/build -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_exists=true" >> $GITHUB_OUTPUT
          else
            echo "No APK found!"
            echo "apk_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: steps.find_apk.outputs.apk_exists == 'true'
        with:
          name: fanhub-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
