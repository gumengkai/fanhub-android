name: Fixed Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --version
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
      
      - name: Debug - Check all files
        run: |
          mkdir -p ./debug-output
          echo "=== Current directory ===" | tee ./debug-output/debug.log
          pwd | tee -a ./debug-output/debug.log
          ls -la | tee -a ./debug-output/debug.log
          
          echo "" | tee -a ./debug-output/debug.log
          echo "=== App directory ===" | tee -a ./debug-output/debug.log
          ls -la app/ | tee -a ./debug-output/debug.log
          
          echo "" | tee -a ./debug-output/debug.log
          echo "=== Build directory ===" | tee -a ./debug-output/debug.log
          ls -laR app/build/ 2>/dev/null | tee -a ./debug-output/debug.log || echo "No build directory" | tee -a ./debug-output/debug.log
          
          echo "" | tee -a ./debug-output/debug.log
          echo "=== All APK files ===" | tee -a ./debug-output/debug.log
          find . -name "*.apk" -type f 2>/dev/null | tee -a ./debug-output/debug.log || echo "No APK files" | tee -a ./debug-output/debug.log
          
          # Copy any found APKs
          find . -name "*.apk" -type f -exec cp {} ./debug-output/ \; 2>/dev/null || true
          ls -la ./debug-output/ | tee -a ./debug-output/debug.log
          
          # Copy build log
          cp build.log ./debug-output/ 2>/dev/null || true
      
      - name: Upload Debug Info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-info
          path: ./debug-output/
          retention-days: 5
