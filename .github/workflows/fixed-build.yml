name: Fixed Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew --version
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
      
      - name: Debug - Check build outputs
        run: |
          echo "::group::Build Directory Structure"
          ls -laR app/build/ 2>/dev/null || echo "No build directory"
          echo "::endgroup::"
          
          echo "::group::APK Search Results"
          echo "Searching for APK files..."
          find . -name "*.apk" -type f 2>/dev/null
          echo "::endgroup::"
          
          echo "::group::Outputs Directory"
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"
          echo "::endgroup::"
          
          # Create output directory and copy APKs
          mkdir -p ./output
          find . -name "*.apk" -type f -exec cp -v {} ./output/ \; 2>/dev/null || echo "No APK files to copy"
          
          echo "::group::Output Directory Contents"
          ls -la ./output/
          echo "::endgroup::"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fanhub-apk
          path: ./output/*.apk
          retention-days: 30
          if-no-files-found: warn
