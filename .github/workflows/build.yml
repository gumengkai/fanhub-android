name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      backend_url:
        description: '后端 API 地址'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 授予 Gradle 执行权限
      run: chmod +x gradlew
      
    - name: 使用 Gradle 构建 Debug 版本
      run: ./gradlew assembleDebug
      
    - name: 上传 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: fanhub-android-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 授予 Gradle 执行权限
      run: chmod +x gradlew
      
    - name: 使用 Gradle 构建 Release 版本
      run: ./gradlew assembleRelease
      
    - name: 上传 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: fanhub-android-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
