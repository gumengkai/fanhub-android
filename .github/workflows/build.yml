name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      backend_url:
        description: '后端 API 地址'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 设置 Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: 使用 Gradle 构建 Debug 版本
      env:
        GRADLE_OPTS: "-Xmx3g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g"
      run: |
        echo "=== 开始构建 ==="
        set -o pipefail
        gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
        BUILD_EXIT=${PIPESTATUS[0]}
        echo "=== 构建退出码：$BUILD_EXIT ==="
        if [ $BUILD_EXIT -ne 0 ]; then
          echo "=== 构建失败，显示错误摘要 ==="
          grep -i "error\|failed\|exception" build.log | head -100
          exit $BUILD_EXIT
        fi
        echo "=== 构建成功，检查 APK 文件 ==="
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/debug/
      
    - name: 上传 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: fanhub-android-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/debug/output-metadata.json
        if-no-files-found: error
        retention-days: 30
        
  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 设置 Gradle
      uses: gradle/actions/setup-gradle@v3
      
    - name: 使用 Gradle 构建 Release 版本
      run: gradle assembleRelease
      
    - name: 上传 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: fanhub-android-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
