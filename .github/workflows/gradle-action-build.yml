name: Gradle Action Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      
      - name: Execute Gradle build
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
      
      - name: Check all outputs
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo ""
          echo "=== App directory ==="
          ls -la app/ 2>/dev/null || echo "No app directory"
          echo ""
          echo "=== Build directory ==="
          ls -la app/build/ 2>/dev/null || echo "No build directory"
          echo ""
          echo "=== All APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo ""
          echo "=== Full build tree ==="
          find app/build -type f 2>/dev/null | head -50
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-action-apk
          path: |
            app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn